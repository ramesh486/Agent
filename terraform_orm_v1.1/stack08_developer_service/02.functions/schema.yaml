title: Create Application in Functions
description: Application Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################
# Variable Groupings
#####################################
groupings:

  - title: "common variables"
    variables:
      - ${compartment_ocid}
      - ${region}
      - ${tenancy_ocid}
      - ${compartment_id_in_subtree}
      - ${compartment_name}
      - ${subnet_display_name}
      - ${display_name}

variables:
#####################################
# Common Variables
#####################################

  compartment_ocid:
    type: oci:identity:compartment:id
    visible: true
    title: Select the Compartment to deploy resources
    description: Choose the Compartment where to deploy the resources

  region:
    type: string
    default: ""
    title: Region Name
    description: The region where the resources will be provisioned
    visible: true
    required: true

  compartment_id_in_subtree:
    type: bool
    default: "true"
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  tenancy_ocid:
    type: string
    default: ""
    title: "Tenancy OCID"
    description: "Tenancy OCID"
    visible: true
    required: true

  compartment_name:
    type: string
    default: "network"
    title: "Compartment Name to deploy the resource"
    description: "Compartment Name to deploy the resource"
    visible: true
    required: true

  
  display_name:
    type: string
    default: "Example_application"
    title: "Application name"
    description: "Name of the application"
    visible: true
    required: true


     