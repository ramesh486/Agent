title: OCI Core Compute Cluster 
description: OCI Core Compute Cluster 
schemaVersion: 1.1.0
version: "31052023"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "common compartment"
    variables:
      - ${region}
      - ${tenancy_ocid}
      - ${compartment_ocid}

  - title: "compute cluster"
    variables:
      - ${availability_domain}
      - ${compute_cluster_display_name}
     

variables: 
### Common Compartment 

  tenancy_ocid:
    visible: false
    title: Tenancy OCID
    description: Enter Tenancy OCID

  region:
    visible: true
    title: Region
    description: Enter Region
    default: "us-ashburn-1"
    
  compartment_ocid:
    type: oci:identity:compartment:id
    visible: true
    title: Select the Compartment to deploy resources
    description: Choose the Compartment where to deploy the resources

  availability_domain:
    type: string
    required: true
    visible: true
    title: "Select Availability domain"   
    default : "pMlX:US-ASHBURN-AD-1"

  compute_cluster_display_name:
    type: string
    required: true
    visible: true
    title: "Enter Compute cluster display name"   
    default : "compute_cluster"

 
  
  