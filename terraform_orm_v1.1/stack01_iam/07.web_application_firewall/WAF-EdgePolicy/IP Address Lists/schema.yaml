title: Create IP Address Lists
description: IP Address Lists Terraform Input Variables
schemaVersion: 1.1.0
version: "05102022"

#####################################

# Variable Groupings

#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${compartment_ocid}
      - ${tenancy_ocid}
      - ${region}
      - ${project_tag}
    
  - title: "IP Address Lists Variables Configuration"
    variables:
      - ${address_list_addresses}
      - ${address_list_display_name}

variables:

#####################################

# Common Compartment

#####################################
  compartment_ocid:
    type: oci:identity:compartment:id
    visible: true
    title: Select the Compartment to deploy resources
    description: Choose the Compartment where to deploy the resources

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region



