title:  Security Zone Terraform Input Variables
description: Security Zone Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################

# Variable Groupings

#####################################

groupings:

  - title: "Security Zone Configuration"
    variables:
      - ${security_zone_display_name}
      - ${security_recipe_ocid}

  - title: "Select the Target Compartment"
    variables:
      - ${compartment_name}
      - ${compartment_id_in_subtree}
      - ${tenancy_ocid}
      - ${region}
      - ${project_tag}

variables:

#####################################

# Common Compartment

#####################################
  compartment_ocid:
    type: oci:identity:compartment:id
    visible: true
    title: Select the Compartment to deploy resources
    description: Choose the Compartment where to deploy the resources

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
