title: OCI DNS Private View Terraform Input Variables
description: OCI DNS Private View Terraform Input Variables
schemaVersion: 1.1.0
version: "15052023"

#####################################

# Variable Groupings

#####################################

groupings:

  - title: "OCI DNS Private View Variables"
    variables:
      - ${dns_view_display_name}
      - ${scope}


  - title: "Select Compartment"
    variables:
      - ${compartment_ocid}
      - ${tenancy_ocid}
      - ${region}

variables:

#####################################

# Common Compartment

#####################################
  compartment_ocid:
    type: oci:identity:compartment:id
    visible: true
    title: Select the Compartment to deploy resources
    description: Choose the Compartment where to deploy the resources

  tenancy_ocid:
    visible: false
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false

######################################

# Core OKE variables

######################################

  dns_view_display_name:
    type: string
    title: OCI DNS View Display Name
    description: Provide custom display name for OCI DNS View
    visible: true
    required: true
    default: ""

  scope:
    type: string
    title: OCI DNS View Scope
    description: OCI DNS View Scope, this value is immutable
    visible: false
    required: true
    default: "PRIVATE"