title: Devops Build Pipeline
description: Devops Build Pipeline
schemaVersion: 1.1.0
version: "11072023"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${tenancy_ocid}
      - ${region}
      - ${compartment_ocid}
      - ${build_pipeline_name}
      - ${default_value}
      - ${description}
      - ${display_name}
      - ${project_name}
      - ${notification_topic}
      
variables:

#####################################
# Common Compartment
#####################################

  compartment_ocid:
    type: string
    visible: true
    title: Select the Compartment to deploy resources
    default : ""
    description: Choose the Compartment where to deploy the resources

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    required: true
    title: Provide the Region
    description: Provide the Region
    default: "us-ashburn-1"

  parameter_name:
    type: string
    visible: true
    required: true
    title: Pipeline Parameter Name
    description: "Provide the name for the Build Pipeline"
    default: "Build_pipeline_param"

  default_value:
    type: string
    visible: true
    required: true
    title: Value of BuildPipeline
    description: "The default value of the Buildpipeline"
    default: "defaultValue"
  
  description:
    type: string
    visible: true
    required: true
    title: "Details of the BuildPipeline"
    description: "Details of the build Pipeline"
    default: "description"

  display_name:
    type: string
    visible: true
    required: true
    title: BuildPipeline Display Name
    description: "Build pipeline display name."
    default: "test_buildpipeline"
  
  project_name:
    type: string
    visible: true
    required: true
    title: Project Name
    description: "Provide the Project name"
    default: "build_project"

  notification_topic:
    type: string
    visible: true
    required: true
    title: Notification Topic Name
    description: "Provide name for Notification Topic"
    default: "test_topic"
