title: Create Secondary Domain
description: Secondary Domain Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################

# Variable Groupings

#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${tenancy_ocid}
      - ${region}
      - ${project_tag}
    
  - title: "Domian Configuration"
    variables:
      - ${domain_display_name}
      - ${domain_description}
      - ${domain_license_type}
  
###################################

# Common Compartment

###################################

variables:

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false

###################################

# Domian Configuration

###################################

  domain_display_name:
    type: string
    visible: true
    title: Domain display name
    default : "SecondaryDomain"
    description: Provide Domain display name

  domain_description:
    type: string
    visible: true
    title: Domain description
    default : "SecondaryDomain"
    description: Provide  Detaile about Domain 

  domain_license_type:
    type: string
    visible: true
    title: domain license type
    default : "Free"
    description: Provide domain license type 