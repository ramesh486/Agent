title:  Security Zone Terraform Input Variables
description: Security Zone Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################

# Variable Groupings

#####################################

groupings:

  - title: "Security Zone Configuration"
    variables:
      - ${security_zone_display_name}
      - ${security_recipe_ocid}

  - title: "Select the Target Compartment"
    variables:
      - ${compartment_name}
      - ${compartment_id_in_subtree}
      - ${tenancy_ocid}
      - ${region}
      - ${project_tag}

variables:

#####################################

# Common Compartment

#####################################
  compartment_name:
    type: string
    visible: true
    title: Compartment Name to deploy resources
    description: Choose the Compartment where to deploy the resources
    default: ""

  compartment_id_in_subtree:
    type: boolean
    visible: true
    title: Compartment ID in Subtree
    description: Compartment ID in Subtree
    default: true

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true

### Security Zone Configuration

  security_zone_display_name:
    type: string
    visible: true
    title: Name for Security Zone
    description: Security Zone Display Nae
    default: "security-zone"

  security_recipe_ocid:
    type: string
    visible: true
    title: OCID for Security Recipe 
    description: OCID for Security Recipe
    default: ""    