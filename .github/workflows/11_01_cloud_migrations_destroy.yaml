
# On successful pull request merge, `terraform destroy` will be executed.
# Update PROVIDER_NAME, BRANCH_NAME, STACK_NAME, WORKING_DIRECTORY, REPO_URL, TF_VERSION

name: 'Destroy Cloud Migrations'
on:
  pull_request:
    types: [closed]
    branches:
      - 'dev11'
    paths:
      - '.github/workflows/11_01_cloud_migrations_destroy.yaml/*'

# ---------------------------------------------
# Permissions
# ---------------------------------------------

permissions:
  contents: write

jobs:
  
  stack11_cloud_migrations_destroy:
    uses: ./.github/workflows/action_runner_destroy.yaml

    # ---------------------------------------------
    # Source Provider Details
    # ---------------------------------------------

    with:

      PROVIDER_NAME: "oci_github"
      BRANCH_NAME: "feature_stack11_migration_dr_destroy"
      STACK_NAME: "stack11_cloud_migrations"
      WORKING_DIRECTORY: "CICD/stack11_migration_dr/01.cloud_migrations"
      REPO_URL: "https://github.com/ebizon-cloud/oci_automation.git"
      TF_VERSION: "1.2.x"

    # ---------------------------------------------
    # Secrets
    # ---------------------------------------------

    secrets:
      USER_OCID: ${{secrets.USER_OCID}}
      FINGERPRINT: ${{secrets.FINGERPRINT}}
      COMPARTMENT_OCID: ${{secrets.COMPARTMENT_OCID}}
      REGION: ${{secrets.REGION}}
      TENANCY_OCID: ${{secrets.TENANCY_OCID}}
      PRIVATE_KEY_FILE: ${{secrets.PRIVATE_KEY_FILE}}
