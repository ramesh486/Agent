
# On pull request events, this workflow will run
# `terraform init`, and `terraform plan`. On successful pull request merge, `terraform apply` will be executed.
# Update PROVIDER_NAME, BRANCH_NAME, STACK_NAME, WORKING_DIRECTORY, REPO_URL, TF_VERSION

name: 'Deploy OIC Landing Zone and Workload'
on:
  repository_dispatch:
    types: [deploy-oic-lz-workload-old]


# ---------------------------------------------
# Permissions
# ---------------------------------------------

permissions:
  contents: write

jobs:

  STACK_NAME_OIC_COMPARTMENTS:
    uses: ./.github/workflows/ai_agent_action_runner_v3.yaml
    # ---------------------------------------------
    # Source Provider Details
    # ---------------------------------------------

    with:

      PROVIDER_NAME: "ai_agent_github_cicd"
      BRANCH_NAME: "dev"
      STACK_NAME: "stack-ai-agent-${{ github.event.client_payload.variables.oic_compartments_variables.oic_compartments_stack_name }}"
      WORKING_DIRECTORY: "${{ github.event.client_payload.variables.oic_compartments_variables.oic_compartments_working_directory }}"
      REPO_URL: "https://github.com/ebizon-cloud/generic-oic-automation.git"
      TF_VERSION: "${{ github.event.client_payload.variables.oic_compartments_variables.tf_version }}"
      CLONE_REPO: "${{ github.event.client_payload.variables.oic_compartments_variables.oic_compartments_clone_repo }}"
      LOCAL_PATH: "${{ github.event.client_payload.variables.oic_compartments_variables.oic_compartments_local_path }}"
      COMPARTMENT_NAME: "${{ github.event.client_payload.variables.oic_compartments_tf_variables.compartment_name }}"
      TF_VARIABLES: "${{ toJson(github.event.client_payload.variables.oic_compartments_tf_variables) }}"
      # TF_VERSION: "1.2.x"
      # TF_JSON: ${{ github.event.inputs.client_payload }}

    # ---------------------------------------------
    # Secrets
    # ---------------------------------------------

    secrets:
      USER_OCID: ${{secrets.USER_OCID}}
      FINGERPRINT: ${{secrets.FINGERPRINT}}
      COMPARTMENT_OCID: ${{secrets.COMPARTMENT_OCID}}
      REGION: ${{secrets.REGION}}
      TENANCY_OCID: ${{secrets.TENANCY_OCID}}
      PRIVATE_KEY_FILE: ${{secrets.PRIVATE_KEY_FILE}}
      PAT: ${{secrets.PAT}}


