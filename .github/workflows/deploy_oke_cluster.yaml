
# On pull request events, this workflow will run
# `terraform init`, and `terraform plan`. On successful pull request merge, `terraform apply` will be executed.
# Update PROVIDER_NAME, BRANCH_NAME, STACK_NAME, WORKING_DIRECTORY, REPO_URL, TF_VERSION

name: 'Deploy OKE Cluster'
on:
  repository_dispatch:
    types: [deploy-oke-cluster]
  # pull_request:
  #   types: [opened, closed]
  #   branches:
  #     - 'dev8'
  #   paths:
  #     - 'CICD/stack08_developer_services/01.oke_cluster/*'

# ---------------------------------------------
# Permissions
# ---------------------------------------------

permissions:
  contents: write

jobs:

  ORM_STACK_OCI_CORE_LANDING_ZONE:
    uses: ebizon-cloud-llc/oci_automation/.github/workflows/ai_agent_action_runner_v3.yaml@master

    # ---------------------------------------------
    # Source Provider Details
    # ---------------------------------------------

    with:

      PROVIDER_NAME: "ai_agent_github_cicd"
      BRANCH_NAME: "master"
      STACK_NAME: "stack-ai-agent-${{ github.event.client_payload.variables.oci_core_variables.oci_core_stack_name }}"
      WORKING_DIRECTORY: "${{ github.event.client_payload.variables.oci_core_variables.oci_core_working_directory }}"
      REPO_URL: "${{ github.event.client_payload.repo_url }}" # "https://github.com/kirankumar-badiger/oci_automation.git"
      TF_VERSION: "${{ github.event.client_payload.variables.oci_core_variables.tf_version }}"
      CLONE_REPO: "${{ github.event.client_payload.variables.oci_core_variables.oci_core_clone_repo }}"
      LOCAL_PATH: "${{ github.event.client_payload.variables.oci_core_variables.oci_core_local_path }}"
      COMPARTMENT_NAME: "${{ github.event.client_payload.variables.oci_core_compartment_name }}"
      TF_VARIABLES: "${{ toJson(github.event.client_payload.variables.oci_core_tf_variables) }}"
      REGION: "${{ github.event.client_payload.variables.oci_core_tf_variables.region }}"
      # TF_VERSION: "1.2.x"
      # TF_JSON: ${{ github.event.inputs.client_payload }}

    # ---------------------------------------------
    # Secrets
    # ---------------------------------------------

    secrets:
      USER_OCID: ${{secrets.USER_OCID}}
      FINGERPRINT: ${{secrets.FINGERPRINT}}
      COMPARTMENT_OCID: ${{secrets.COMPARTMENT_OCID}}
      REGION: ${{secrets.REGION}}
      TENANCY_OCID: ${{secrets.TENANCY_OCID}}
      PRIVATE_KEY_FILE: ${{secrets.PRIVATE_KEY_FILE}}
      PAT: ${{secrets.PAT}}
      EMAIL_ID: ${{secrets.EMAIL_ID}}
      SMTP_USERNAME: ${{secrets.SMTP_USERNAME}}
      SMTP_PASSWORD: ${{secrets.SMTP_PASSWORD}}


  ORM_STACK_OKE_VCN:
    uses: ebizon-cloud-llc/oci_automation/.github/workflows/ai_agent_action_runner_v3.yaml@master
    needs: ORM_STACK_OCI_CORE_LANDING_ZONE
    # ---------------------------------------------
    # Source Provider Details
    # ---------------------------------------------

    with:

      PROVIDER_NAME: "ai_agent_github_cicd"
      BRANCH_NAME: "master"
      STACK_NAME: "stack-ai-agent-${{ github.event.client_payload.variables.oke_vcn_variables.oke_vcn_stack_name }}"
      WORKING_DIRECTORY: "${{ github.event.client_payload.variables.oke_vcn_variables.oke_vcn_working_directory }}"
      REPO_URL: "${{ github.event.client_payload.repo_url }}" # "https://github.com/kirankumar-badiger/oci_automation.git"
      TF_VERSION: "${{ github.event.client_payload.variables.oke_vcn_variables.tf_version }}"
      CLONE_REPO: "${{ github.event.client_payload.variables.oke_vcn_variables.oke_vcn_clone_repo }}"
      LOCAL_PATH: "${{ github.event.client_payload.variables.oke_vcn_variables.oke_vcn_local_path }}"
      COMPARTMENT_NAME: "${{ github.event.client_payload.variables.oke_vcn_tf_variables.network_compartment_name }}"
      TF_VARIABLES: "${{ toJson(github.event.client_payload.variables.oke_vcn_tf_variables) }}"
      REGION: "${{ github.event.client_payload.variables.oke_vcn_tf_variables.region }}"
      # TF_VERSION: "1.2.x"
      # TF_JSON: ${{ github.event.inputs.client_payload }}

    # ---------------------------------------------
    # Secrets
    # ---------------------------------------------

    secrets:
      USER_OCID: ${{secrets.USER_OCID}}
      FINGERPRINT: ${{secrets.FINGERPRINT}}
      COMPARTMENT_OCID: ${{secrets.COMPARTMENT_OCID}}
      REGION: ${{secrets.REGION}}
      TENANCY_OCID: ${{secrets.TENANCY_OCID}}
      PRIVATE_KEY_FILE: ${{secrets.PRIVATE_KEY_FILE}}
      PAT: ${{secrets.PAT}}
      EMAIL_ID: ${{secrets.EMAIL_ID}}
      SMTP_USERNAME: ${{secrets.SMTP_USERNAME}}
      SMTP_PASSWORD: ${{secrets.SMTP_PASSWORD}}




  ORM_STACK_OKE_CLUSTER:
    needs: ORM_STACK_OKE_VCN
    uses: ebizon-cloud-llc/oci_automation/.github/workflows/ai_agent_action_runner_v3.yaml@master

    # ---------------------------------------------
    # Source Provider Details
    # ---------------------------------------------

    with:

      PROVIDER_NAME: "ai_agent_github_cicd"
      BRANCH_NAME: "master"
      STACK_NAME: "stack-ai-agent-${{ github.event.client_payload.variables.oke_variables.oke_stack_name }}"
      WORKING_DIRECTORY: "${{ github.event.client_payload.variables.oke_variables.oke_working_directory }}"
      REPO_URL: "${{ github.event.client_payload.repo_url }}" # "https://github.com/kirankumar-badiger/oci_automation.git"
      TF_VERSION: "${{ github.event.client_payload.variables.oke_variables.tf_version }}"
      CLONE_REPO: "${{ github.event.client_payload.variables.oke_variables.oke_clone_repo }}"
      LOCAL_PATH: "${{ github.event.client_payload.variables.oke_variables.oke_local_path }}"
      COMPARTMENT_NAME: "${{ github.event.client_payload.variables.oke_compartment_name }}"
      TF_VARIABLES: "${{ toJson(github.event.client_payload.variables.oke_tf_variables) }}"
      REGION: "${{ github.event.client_payload.variables.oke_tf_variables.region }}"


    # ---------------------------------------------
    # Secrets
    # ---------------------------------------------

    secrets:
      USER_OCID: ${{secrets.USER_OCID}}
      FINGERPRINT: ${{secrets.FINGERPRINT}}
      COMPARTMENT_OCID: ${{secrets.COMPARTMENT_OCID}}
      REGION: ${{secrets.REGION}}
      TENANCY_OCID: ${{secrets.TENANCY_OCID}}
      PRIVATE_KEY_FILE: ${{secrets.PRIVATE_KEY_FILE}}
      PAT: ${{secrets.PAT}}
      EMAIL_ID: ${{secrets.EMAIL_ID}}
      SMTP_USERNAME: ${{secrets.SMTP_USERNAME}}
      SMTP_PASSWORD: ${{secrets.SMTP_PASSWORD}}

  ORM_STACK_CD3_EXPORT:
    needs: ORM_STACK_OKE_CLUSTER
    uses: ebizon-cloud-llc/oci_automation/.github/workflows/ai_agent_action_runner_v3_cd3_export.yaml@master

    # ---------------------------------------------
    # Source Provider Details
    # ---------------------------------------------

    with:

      PROVIDER_NAME: "ai_agent_github_cicd"
      BRANCH_NAME: "master"
      STACK_NAME: "stack-ai-agent-${{ github.event.client_payload.variables.oke_variables.oke_stack_name }}"
      WORKING_DIRECTORY: "${{ github.event.client_payload.variables.oke_variables.oke_working_directory }}"
      REPO_URL: "${{ github.event.client_payload.repo_url }}" # "https://github.com/kirankumar-badiger/oci_automation.git"
      TF_VERSION: "${{ github.event.client_payload.variables.oke_variables.tf_version }}"
      CLONE_REPO: "${{ github.event.client_payload.variables.oke_variables.oke_clone_repo }}"
      LOCAL_PATH: "${{ github.event.client_payload.variables.oke_variables.oke_local_path }}"
      COMPARTMENT_NAME: "${{ github.event.client_payload.variables.oke_compartment_name }}"
      TF_VARIABLES: "${{ toJson(github.event.client_payload.variables.oke_tf_variables) }}"
      REGION: "${{ github.event.client_payload.variables.oke_tf_variables.region }}"


    # ---------------------------------------------
    # Secrets
    # ---------------------------------------------

    secrets:
      USER_OCID: ${{secrets.USER_OCID}}
      FINGERPRINT: ${{secrets.FINGERPRINT}}
      COMPARTMENT_OCID: ${{secrets.COMPARTMENT_OCID}}
      REGION: ${{secrets.REGION}}
      TENANCY_OCID: ${{secrets.TENANCY_OCID}}
      PRIVATE_KEY_FILE: ${{secrets.PRIVATE_KEY_FILE}}
      PAT: ${{secrets.PAT}}
      EMAIL_ID: ${{secrets.EMAIL_ID}}
      SMTP_USERNAME: ${{secrets.SMTP_USERNAME}}
      SMTP_PASSWORD: ${{secrets.SMTP_PASSWORD}}

