name: Create or Update Secrets from Power Automate

on:
  repository_dispatch:
    types: [create-update-secret]

permissions:
  contents: write
  actions: write

jobs:
  encrypt-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          pip install pynacl

      - name: Debug received public key and secrets
        run: |
          echo "Received public key (base64): ${{ github.event.client_payload.key }}"
          echo "Public key length (base64): $(echo '${{ github.event.client_payload.key }}' | wc -c)"
          echo "Received TENANCY_OCID: ${{ github.event.client_payload.TENANCY_OCID }}"
          echo "Received USER_OCID: ${{ github.event.client_payload.USER_OCID }}"
          echo "Received FINGERPRINT: ${{ github.event.client_payload.FINGERPRINT }}"
          echo "Received PRIVATE_KEY_FILE: ${{ github.event.client_payload.PRIVATE_KEY_FILE }}"
          echo "Received REGION: ${{ github.event.client_payload.REGION }}"
          echo "Received COMPARTMENT_OCID: ${{ github.event.client_payload.COMPARTMENT_OCID }}"
          
      - name: Encrypt secrets
        id: encrypt
        env:
          PUBLIC_KEY: ${{ github.event.client_payload.key }}
          TENANCY_OCID: ${{ github.event.client_payload.TENANCY_OCID }}
          USER_OCID: ${{ github.event.client_payload.USER_OCID }}
          FINGERPRINT: ${{ github.event.client_payload.FINGERPRINT }}
          PRIVATE_KEY_FILE: ${{ github.event.client_payload.PRIVATE_KEY_FILE }}
          REGION: ${{ github.event.client_payload.REGION }}
          COMPARTMENT_OCID: ${{ github.event.client_payload.COMPARTMENT_OCID }}
        run: |
          python - <<EOF
          from base64 import b64encode, b64decode
          from nacl import encoding, public
          import sys, json, os
          
          def encrypt(public_key: str, secret_value: str) -> str:
              """Encrypt a secret using libsodium"""
              try:
                  # Remove any whitespace from the public key
                  public_key = public_key.strip()
                  
                  # Decode the public key from base64
                  public_key_bytes = b64decode(public_key)
                  
                  # Print debug information
                  print(f"Decoded public key length: {len(public_key_bytes)} bytes")
                  
                  # Create public key object
                  public_key_obj = public.PublicKey(public_key_bytes)
                  
                  # Create sealed box
                  box = public.SealedBox(public_key_obj)
                  
                  # Encrypt the secret value
                  encrypted = box.encrypt(secret_value.encode('utf-8'))
                  
                  # Return base64 encoded encrypted value
                  return b64encode(encrypted).decode('utf-8')
              except Exception as e:
                  print(f"Error during encryption: {str(e)}")
                  print(f"Public key (base64): {public_key}")
                  raise
          
          # Get the public key from environment
          public_key = os.environ['PUBLIC_KEY']
          
          # Get the secrets to encrypt
          secrets_to_encrypt = {
              "TENANCY_OCID": os.environ['TENANCY_OCID'],
              "USER_OCID": os.environ['USER_OCID'],
              "FINGERPRINT": os.environ['FINGERPRINT'],
              "PRIVATE_KEY_FILE": os.environ['PRIVATE_KEY_FILE'],
              "COMPARTMENT_OCID": os.environ['COMPARTMENT_OCID'],
              "REGION": os.environ['REGION']
          }
          
          encrypted_secrets = {}
          
          try:
              for secret_name, secret_value in secrets_to_encrypt.items():
                  encrypted_value = encrypt(public_key, secret_value)
                  encrypted_secrets[secret_name] = encrypted_value
              
              # Set the outputs using the GITHUB_OUTPUT environment file
              github_output_path = os.getenv('GITHUB_OUTPUT')
              if not github_output_path:
                  raise EnvironmentError("GITHUB_OUTPUT environment variable is not set.")
              
              with open(github_output_path, 'a') as gh_output:
                  for secret_name, encrypted_value in encrypted_secrets.items():
                      output_name = f'encrypted_{secret_name}'
                      gh_output.write(f'{output_name}={encrypted_value}\n')
                      
              print("Encryption successful. Outputs set.")
              
          except Exception as e:
              print(f"Failed to encrypt secrets: {str(e)}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Create or update secrets
        if: success()
        env:
          TOKEN: ${{ github.event.client_payload.token }}
          KEY_ID: ${{ github.event.client_payload.key_id }}
        run: |
          # Function to update a secret
          update_secret() {
            local SECRET_NAME=$1
            local ENCRYPTED_VALUE=$2
            echo "Updating secret $SECRET_NAME"
            curl -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/kirankumar-badiger/oci_automation/actions/secrets/$SECRET_NAME \
              -d "{\"encrypted_value\":\"$ENCRYPTED_VALUE\",\"key_id\":\"$KEY_ID\"}"
          }

          # Update each secret
          update_secret "TENANCY_OCID" "${{ steps.encrypt.outputs.encrypted_TENANCY_OCID }}"
          update_secret "USER_OCID" "${{ steps.encrypt.outputs.encrypted_USER_OCID }}"
          update_secret "FINGERPRINT" "${{ steps.encrypt.outputs.encrypted_FINGERPRINT }}"
          update_secret "PRIVATE_KEY_FILE" "${{ steps.encrypt.outputs.encrypted_PRIVATE_KEY_FILE }}"
          update_secret "COMPARTMENT_OCID" "${{ steps.encrypt.outputs.encrypted_COMPARTMENT_OCID }}"
          update_secret "REGION" "${{ steps.encrypt.outputs.encrypted_REGION }}"
      # ---------------------------------------------
      #  Writing config files
      # ---------------------------------------------

      - name: 'Writing config files'
        run: |
          rm -rf ~/.oci
          mkdir ~/.oci
          echo "[DEFAULT]" >> ~/.oci/config
          echo "user=${{secrets.USER_OCID}}" >> ~/.oci/config
          echo "fingerprint=${{secrets.FINGERPRINT}}" >> ~/.oci/config
          echo "compartment_ocid=${{secrets.COMPARTMENT_OCID}}" >> ~/.oci/config
          echo "region=${{secrets.REGION}}" >> ~/.oci/config
          echo "tenancy=${{secrets.TENANCY_OCID}}" >> ~/.oci/config
          echo "key_file=~/.oci/key.pem" >> ~/.oci/config
          echo "${{secrets.PRIVATE_KEY_FILE}}" >> ~/.oci/key.pem
          echo "~/.oci/config file "
          cat ~/.oci/config
          echo " ~/.oci/key.pem file"
          ls -lta ~/.oci
          ls -lta ~

      # ---------------------------------------------
      #  Install OCI CLI
      # ---------------------------------------------

      - name: 'Install OCI CLI'
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          #exec -l $SHELL
          echo " Fixing file permissions and testing oci"
          /home/runner/bin/oci setup repair-file-permissions --file ~/.oci/config
          /home/runner/bin/oci setup repair-file-permissions --file ~/.oci/key.pem
          echo "# ---------------------------------------------"
          echo "#  Authenticating to OCI"
          echo "# ---------------------------------------------"
          /home/runner/bin/oci os ns get
          if [ $? -ne 0 ]; then
            echo "Authentication failed"
            exit 1
          else
            echo "Authentication is successful"
          fi
