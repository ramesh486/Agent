description: Secrets
title: Terraform Input Variables
schemaVersion: 1.1.0
version: "20190304"

#####################################
# Variable Groupings
#####################################

variableGroups:

  - title: "OCI Configuration"
    variables:
      - ${region}
      - ${tenancy_ocid}
      - ${compartment_name}
      - ${compartment_id_in_subtree}
      - ${project_tag}

  - title: "Vault Configuration"
    variables:
      - ${secret_secret_content_content_type}
      - ${secret_secret_content_content}
      - ${secret_name}
      - ${secret_description}
      - ${vault_name}
      - ${master_key_name}

variables:
#####################################

# Common Compartment

#####################################
  
  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true

