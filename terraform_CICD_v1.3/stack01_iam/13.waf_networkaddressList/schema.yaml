title: Create WAF Network Address List
description: WAF Network Address List Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################

# Variable Groupings

#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${tenancy_ocid}
      - ${region}
      - ${security_compartment_name}
      - ${network_compartment_name}
      - ${security_compartment_id_in_subtree}
      - ${network_compartment_id_in_subtree}
      - ${vcn_display_name}
      - ${project_tag}
    
  - title: "WAF Network IP Address Configuration"
    variables:
      - ${network_ip_address_list_display_name}
      - ${network_ip_address_list_type}
      - ${network_ip_address_list_address}

  - title: "WAF Network VCN Address Configuration"
    variables:
      - ${network_vcn_address_list_display_name}
      - ${network_vcn_address_list_type}
      - ${network_address_list_vcn_addresses_addresses}

variables:

#####################################

# Common Compartment

#####################################
  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    title: Region
    description: Region

  security_compartment_name:
    type: string
    title: "Compartment Name"
    default: ""
    description: "Provide Compartment name"
    visible: true
    required: true

  security_compartment_id_in_subtree:
    type: bool
    title: "Compartment ID in Subtree"
    default: true
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  network_compartment_name:
    type: string
    title: "Compartment Name"
    default: ""
    description: "Provide Compartment name"
    visible: true
    required: true

  network_compartment_id_in_subtree:
    type: bool
    title: "Compartment ID in Subtree"
    default: true
    description: "Compartment ID in Subtree"
    visible: true
    required: true
  
  vcn_display_name:
    type: string
    visible: true
    title: VCN Dispaly Name 
    description: The VCN name in which the application is deployed
    default: ""

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false


