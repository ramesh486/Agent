title: Visual Builder
description: Visual Builder 
schemaVersion: 1.1.0
version: "25012022"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "Visual Builder variables"
    variables:
      - ${tenancy_ocid}    
      - ${region}
      - ${compartment_name}
      - ${compartment_id_in_subtree} 
      - ${project_tag}
      - ${display_name}
      - ${idcs_open_id}
      - ${vb_instance_consumption_model}
      - ${custom_endpoint_host_name}
      - ${is_visual_builder_enabled}
      - ${node_count}

variables:

####################################
#  Common variables
####################################

  compartment_id_in_subtree:
    type: bool
    title: "Compartment ID in Subtree"
    default: true
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  compartment_name:
    type: string
    title: "Compartment Name"
    default: ""
    description: "Compartment Name to deploy the resource"
    visible: true
    required: true

  region:
    visible: true
    required: true
    title: Region
    description: Enter Region
    default: "us-ashburn-1"

  tenancy_ocid:
    title: "Tenancy OCID"
    type: string
    required: true 

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false 
 
####################################
#  Visual Builder variables
####################################
   
  display_name:
    type: string
    required: true
    visible: true
    default: "vb_instance"
    title: The display name of vb instance
    description: The display name of vb instance

  idcs_open_id:
    type: password
    required: true
    visible: true
    default: ""
    title: Provide IDCS open id
    description: Provide IDCS open id

  vb_instance_consumption_model:
    type: string
    required: true
    visible: true
    default: "UCM"
    title: Provide vb instance consumption model
    description: Provide vb instance consumption model
  
  custom_endpoint_host_name:
    type: string
    required: true
    visible: true
    default: "hostname.com"
    title: Provide custom endpoint host name
    description: Provide custom endpoint host name

  is_visual_builder_enabled:
    type: bool
    required: true
    visible: true
    default: true
    title: Is visual builder enabled
    description: Is visual builder enabled

  node_count:
    type: number
    required: true
    visible: true
    default: 1
    title: Provide node count
    description: Provide node count
  