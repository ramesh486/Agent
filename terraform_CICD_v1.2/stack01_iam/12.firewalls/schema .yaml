title: Create Network Firewalls
description: Network Firewalls Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################
# Variable Groupings
#####################################
groupings:

  - title: "common variables"
    variables:
      - ${region}
      - ${tenancy_ocid}    
      - ${security_compartment_name}
      - ${security_compartment_id_in_subtree}
      - ${network_compartment_name}
      - ${network_compartment_id_in_subtree}
      - ${project_tag}
      - ${subnet_display_name}
      - ${network_firewall_display_name}

  - title: "Network_policy"
    variables:
      - ${network_firewall_policy_display_name}
      - ${network_firewall_policy_application_lists_key}
      - ${network_firewall_policy_application_lists_type}
      - ${network_firewall_policy_ip_address_lists_name}
      - ${network_firewall_policy_ip_address_lists_value}
      - ${network_firewall_policy_security_rules_action}
      - ${network_firewall_policy_security_rules_name}
      - ${network_firewall_policy_security_rules_condition_applications}
      - ${network_firewall_policy_security_rules_condition_destinations}
      - ${network_firewall_policy_security_rules_condition_sources}
      - ${network_firewall_policy_security_rules_condition_urls}
      - ${network_firewall_policy_security_rules_inspection}
      - ${network_firewall_policy_url_lists_key}
      - ${network_firewall_policy_url_lists_type}

variables:
#####################################
# Common Variables
#####################################
  region:
    type: string
    title: Region
    description: Region
    visible: true

  tenancy_ocid:
    type: string
    title: "Tenancy OCID"
    description: "Tenancy OCID"
    visible: true

  security_compartment_name:
    type: string
    visible: true
    default: ""
    title: Select the Compartment to deploy resources
    description: Choose the Compartment where to deploy the resources

  security_compartment_id_in_subtree:
    type: boolean
    default: true
    title: Compartment id in subtree
    description: Compartment ID in Subtree
    visible: true

  network_compartment_name:
    type: string
    default: ""
    title: "Compartment Name to deploy the resource"
    description: "Compartment Name to deploy the resource"
    visible: true

  network_compartment_id_in_subtree:
    type: boolean
    default: true
    title: Compartment ID in Subtree
    description: Compartment ID in Subtree
    visible: true    

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    
  subnet_display_name:
    type: string
    default: ""
    title: "Subnet Name"
    description: "The subnet in which the application is deployed"
    visible: true

  network_firewall_display_name:
    type: string
    default: "Example_firewall"
    title: "Network firewall display name"
    description: "The display name for the network firewall"
    required: true
    visible: true

############## Firewall policy ###############
   
  network_firewall_policy_display_name:
    type: string
    default: "Example_firewall_policy"
    title: "Network Firewall Policy Display Name"
    description: "The display name for the network firewall policy"
    required: true
    visible: true

  network_firewall_policy_application_lists_key:
    type: string
    default: "my_application_list"
    title: "Application Lists Key"
    description: "The key for the application lists in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_application_lists_type:
    type: string
    default: "TCP"
    title: "Application Lists Type"
    description: "The type of the application lists in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_ip_address_lists_name:
    type: string
    default: "IPv4"
    title: "IP Address Lists Name"
    description: "The name for the IP address lists in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_ip_address_lists_value:
    type: string
    default: "10.0.1.0/16"
    title: "IP Address Lists Value"
    description: "The value of the IP address lists in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_security_rules_action:
    type: string
    default: "Allow traffic"
    title: "Security Rules Action"
    description: "The action for the security rules in the firewall policy."
    required: true
    visible: true

  network_firewall_policy_security_rules_name:
    type: string
    default: "Example_rule"
    title: "Security Rules Name"
    description: "The name for the security rules in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_security_rules_condition_applications:
    type: string
    default: "app-1"
    title: "Security Rules Condition Applications"
    description: "The list of applications for the security rules in the firewall policy"
    required: true
    visible: true
    
  network_firewall_policy_security_rules_condition_destinations:
    type: string
    default: "hr_source"
    title: "Security Rules Condition Destinations"
    description: "The list of destinations for the security rules in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_security_rules_condition_sources:
    type: string
    default: "hr_source"
    title: "Security Rules Condition Sources"
    description: "The list of sources for the security rules in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_security_rules_condition_urls:
    type: string
    default: "hr"
    title: "Security Rules Condition URLs"
    description: "The list of URLs for the security rules in the firewall policy"
    required: true
    visible: true

  network_firewall_policy_security_rules_inspection:
    type: string
    default: "INTRUSION_DETECTION"
    title: "Security Rules Inspection"
    description: "The inspection type for the security rules in the firewall policy"
    required: true
    visible: true
 
  network_firewall_policy_url_lists_key:
    type: string
    default: "Example_Url"
    title: "URL Lists Key"
    description: "The key for the URL lists in the firewall policy"
    required: true
    visible: true
  
  network_firewall_policy_url_lists_type:
    type: string
    default: "SIMPLE"
    title: "URL Lists Type"
    description: "The type of the URL lists in the firewall policy"
    required: true
    visible: true