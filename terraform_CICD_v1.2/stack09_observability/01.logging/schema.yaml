      - ${tenancy_ocid}
      - ${region}
      
  - title: "identity variables"
    variables:
      - ${log_group_defined_tags_value1}
      - ${log_group_freeform_tags}
      - ${tag_namespace_description1}
      - ${tag_namespace_name}

########### log variables ###########

  - title: "log_variables"
