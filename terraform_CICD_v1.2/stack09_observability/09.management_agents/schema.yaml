title: Management Agent
description: Management Agent key
schemaVersion: 1.1.0
version: "25012022"

######################################
#  Variable Groupings
# #####################################

groupings:
 
  - title: "common compartment"
    variables:
      # - ${compartment_ocid}
      - ${region}
      - ${tenancy_ocid}
      - ${compartment_id_in_subtree}
      - ${compartment_name}
      
      
  - title: "management agent key configurations"
    variables:
      - ${management_agent_install_key_display_name}
      - ${management_agent_install_key_allowed_key_install_count}
      - ${management_agent_install_key_time_expires}
      - ${management_agent_install_key_is_unlimited}

#####################################
# Common Compartment
#####################################

variables:


  region:
    visible: true
    title: Region
    description: Region

  compartment_name:
    type: string
    title: "Compartment Name"
    default: "oci_app"
    description: "Provide Compartment name"
    visible: true
    required: true

  compartment_id_in_subtree:
    type: bool
    title: "Compartment ID in Subtree"
    default: true
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID



#######################################
# management agent key configurations
#######################################

management_agent_install_key_display_name:
    type: string
    default: "Test_agent"
    title: "management_agent_install_key_display_name"
    description: "managemant agent key name"
    required: true
    visible: true

management_agent_install_key_allowed_key_install_count:
    type: number
    default: 10
    title: "management_agent_install_key_allowed_key_install_count"
    description: "managemant agent key count"
    required: true
    visible: true

management_agent_install_key_time_expires:
    type: string
    default: "2023-06-08T17:27:44.398Z"
    title: "management_agent_install_key_time_expires"
    description: "managemant agent key time"
    required: true
    visible: true

management_agent_install_key_is_unlimited:
    type: bool
    default: true
    title: "management_agent_install_key_time_expires"
    description: "managemant agent key time"
    required: true
    visible: true   


      