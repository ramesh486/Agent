title: OCI Instance Pool
description: Oci Instance Pool
schemaVersion: 1.1.0
version: "25012022"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "Select the target compartment to create the resources"
    variables:
      - ${tenancy_ocid}
      - ${region}
      - ${app_compartment_id_in_subtree}
      - ${app_compartment_name}
      - ${network_compartment_id_in_subtree}
      - ${network_compartment_name}
      - ${project_tag}
      

  - title: "network Variables"
    variables: 
      - ${subnet_display_name}
      
  - title: "instance pool Variables"
    variables:
      - ${instance_configuration_ocid} 
      - ${instance_pool_size}
      - ${instance_pool_state}
      - ${instance_pool_display_name}

variables:

####################################
#  Common Compartment
####################################

  tenancy_ocid:
    visible: true
    title: tenancy ocid
    description: tenancy ocid

  region:
    visible: true
    title: Region
    description: Region

  app_compartment_id_in_subtree:
    type: bool
    default: true
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  app_compartment_name:
    type: string
    default: ""
    title: "Compartment Name to deploy the resource"
    description: "Compartment Name to deploy the resource"
    visible: true
    required: true
  
  network_compartment_id_in_subtree:
    type: bool
    default: true
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  network_compartment_name:
    type: string
    default: ""
    title: "Compartment Name of the Subnet"
    description: "Compartment Name of the Subnet"
    visible: true
    required: true

  subnet_display_name:
    type: string
    default: ""
    title: "Subnet Name"
    description: "The subnet in which the application is deployed"
    visible: true
    required: true


  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false

  

# ----------------------------------------
#  instance pool Variables
# ----------------------------------------

  instance_configuration_display_name:
    type: string
    required: true
    visible: true
    default: ""
    title: "Select the instance configuration Name"
    description: "Select the instance configuration name"
  
  instance_pool_size:
    type: number
    required: true
    visible: true
    default: "2"
    title: "instance pool size"
    description: "instance pool size"
  
  instance_pool_state:
    type: string
    required: true
    visible: true
    default: "RUNNING"
    title: "instance pool state"
    description: "instance pool state"

  instance_pool_display_name:
    type: string
    required: true
    visible: true
    default: "TestInstancePool"
    title: "instance pool display name"
    description: "instance pool display name"

