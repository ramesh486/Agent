title: creating paloalto VM
description: creating paloalto VM
schemaVersion: 1.1.0
version: "14062023"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${tenancy_ocid}
      - ${region}
      - ${app_compartment_id_in_subtree}
      - ${app_compartment_name}
      - ${network_compartment_id_in_subtree}
      - ${network_compartment_name}
      - ${project_tag}
      - ${subnet_display_name}
    
  - title: "virtual machine variables"
    variables:
      - ${is_management_disabled}
      - ${is_monitoring_disabled}
      - ${ssh_authorized_keys}
      - ${desired_state1}
      - ${name1}
      - ${desired_state2}
      - ${name2}
      - ${desired_state3}
      - ${name3}
      - ${desired_state4}
      - ${name4}
      - ${desired_state5}
      - ${name5}
      - ${desired_state6}
      - ${name6}
      - ${desired_state7}
      - ${name7}
      - ${desired_state8}
      - ${name8}
      - ${desired_state9}
      - ${name9}
      - ${desired_state10}
      - ${name10}
      
      
      - ${recovery_action}
      - ${assign_private_dns_record}
      - ${assign_public_ip}
      - ${are_legacy_imds_endpoints_disabled}
      - ${display_name}
      - ${shape}
      - ${memory_in_gbs}
      - ${ocpus}
      - ${source_id}
      - ${source_type}

variables:

####################################
# Common Compartment
####################################

  tenancy_ocid:
    visible: false
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: false
    title: Region
    description: Region

  app_compartment_id_in_subtree:
    type: bool
    default: true
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  app_compartment_name:
    type: string
    default: ""
    title: "Compartment Name to deploy the resource"
    description: "Compartment Name to deploy the resource"
    visible: true
    required: true
  
  network_compartment_id_in_subtree:
    type: bool
    default: true
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  network_compartment_name:
    type: string
    default: ""
    title: "Compartment Name of the Subnet"
    description: "Compartment Name of the Subnet"
    visible: true
    required: true

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false

  subnet_display_name:
    type: string
    default: ""
    title: "Subnet Name"
    description: "The subnet in which the application is deployed"
    visible: true
    required: true

  is_management_disabled:
