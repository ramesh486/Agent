title: Devops Deploy Pipeline
description: Devops Deploy Pipeline
schemaVersion: 1.1.0
version: "13072023"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${tenancy_ocid}
      - ${region}
      - ${app_compartment_name}
      - ${app_compartment_id_in_subtree}
      - ${network_compartment_name}
      - ${network_compartment_id_in_subtree}                  
      - ${project_name}
      - ${notification_topic_name}
      - ${deploy_pipeline_display_name}
      - ${deploy_artifact_display_name}
      - ${deploy_artifact_type}
      - ${argument_substitution_mode}
      - ${deploy_artifact_source_type}
      - ${base64encoded_content}
      - ${deploy_environment_type}
      - ${deploy_environment_display_name}
      - ${deploy_stage_type}
      - ${deploy_stage_display_name}
      - ${strategy_type}
      - ${namespace_a}
      - ${namespace_b}
      - ${ingress_name}
      - ${deploy_stage_type1}
      - ${deploy_stage_display_name1}
      - ${kubernetes_version}
      - ${cluster_name}
      - ${cidr_block}
      - ${display_name}
      - ${vcn_display_name}      


variables:

#####################################
# Common Compartment
#####################################

  app_compartment_name:
    type: string
    visible: true
    title: Compartment Name
    description: Compartment Name of the Resource
    default: ""

  app_compartment_id_in_subtree:
    type: boolean
    visible: true
    title: Compartment ID in Subtree
    description: Compartment ID in Subtree
    default: true

  network_compartment_name:
    type: string
    visible: true
    title: Compartment Name
    description: Compartment Name of the VCN Resource
    default: ""

  network_compartment_id_in_subtree:
    type: boolean
    visible: true
    title: Compartment ID in Subtree
    description: Compartment ID in Subtree
    default: true

  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    required: true
    title: Region
    description: Region
    default: "us-ashburn-1"

  project_name:
    type: string
    visible: true
    required: true
    title: Project Name
    description: "Provide the Project name "
    

  vcn_display_name:
    type: string
    visible: true
    required: true
    title: VCN Name
    description: VCN Name
    default: ""    

  notification_topic_name:
    type: string
    visible: true
    required: true
    title: Notification Topic Name
    description: "Provide name for Notification Topic"
    default: "test_demo_topic123"

  deploy_pipeline_display_name:
    type: string
    visible: true
    required: true
    title: Deployment Pipeline Display Name
    description: "Deployment pipeline display name."
    default: "deployPipeline"

  deploy_artifact_display_name:
    type: string
    visible: true
    required: true
    title: "Deployment Artifact Display Name"
    description: "Deployment artifact display name"
    default: "inlineDeployArtifact"
  
  deploy_artifact_type:
    type: string
    visible: true
    required: true
    title: "Deploy Artifact Type"
    description: "Type of the deployment artifact."
    default: "KUBERNETES_MANIFEST"

  argument_substitution_mode:
    type: string
    visible: true
    required: true
    title: Argument Substitution Mode
    description: "Mode for artifact parameter substitution."
    default: "NONE"
  
  deploy_artifact_source_type:
    visible: true
    required: true
    title: "Deploy Artifact Source Type"
    description: "Specifies types of artifact sources."
    default: "INLINE"

  base64encoded_content:
    type: string
    visible: true
    required: true
    title: Content Inline Artifact
    description: "Specifies content for the inline artifact"
    default: ""

  deploy_environment_type:
    type: string
    visible: true
    required: true
    title: Notification Topic Name
    description: "Deployment Environment Type."
    default: "OKE_CLUSTER"

  deploy_environment_display_name:
    type: string
    visible: true
    required: true
    title: Deployment Environment Display Name
    description: "Deployment environment display name."
    default: "okeDeployEnvironment"

  deploy_stage_type:
    type: string
    visible: true
    required: true
    title: "Deployment Stage Type"
    description: "Deployment stage type."
    default: "OKE_BLUE_GREEN_DEPLOYMENT"
  
  deploy_stage_display_name:
    type: string
    visible: true
    required: true
    title: "Deployment Stage Display Name"
    description: "Deployment stage display name"
    default: "okeBlueGreenDeployStage"

  strategy_type:
    type: string
    visible: true
    required: true
    title: Strategy Type
    description: "Blue Green strategy type."
    default: "NGINX_BLUE_GREEN_STRATEGY"

  namespace_a:
    type: string
    visible: true
    required: true
    title: First Namespace
    description: "First Namespace for deployment."
    default: "namespaceA"

  namespace_b:
    type: string
    visible: true
    required: true
    title: Second Namespace
    description: "Second Namespace for deployment."
    default: "namespaceB"

  ingress_name:
    type: string
    visible: true
    required: true
    title: "Ingress resource Name"
    description: "Name of the Ingress resource."
    default: ingressName

  deploy_stage_type1:
    type: string
    visible: true
    required: true
    title: "Deployment Stage Type"
    description: "Deployment stage type. "
    default: "OKE_BLUE_GREEN_TRAFFIC_SHIFT"
  
  deploy_stage_display_name1:
    type: string
    visible: true
    required: true
    title: "Deployment Stage Display Name"
    description: "Deployment stage display name"
    default: "okeBlueGreenTrafficShiftDeployStage"

  kubernetes_version:
    type: string
    visible: true
    required: true
    title: "Kubernetes Version"
    description: "The version of Kubernetes to install into the cluster masters"
    default: "v1.24.1"

  cluster_name:
    type: string
    visible: true
    required: true
    title: "Cluster Name"
    description: "The name of the cluster"
    default: "cluster"
  
  cidr_block:
    type: string
    visible: true
    required: true
    title: CIDR Block
    description: "The CIDR block for Kubernetes pods "
    default: "10.0.0.0/16"
  
  display_name:
    type: string
    visible: true
    required: true
    title: Cluster Display Name
    description: "The OCID of the virtual cloud network (VCN) in which to create the cluster"
    default: "tfVcnForClusters"
  