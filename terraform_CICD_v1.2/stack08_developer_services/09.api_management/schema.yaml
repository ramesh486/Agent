title: Create API Gateway
description: API Gateway Terraform Input Variables
schemaVersion: 1.1.0
version: "25012022"

#####################################
# Variable Groupings
#####################################
groupings:

  - title: "common variables"
    variables:
      # - ${compartment_ocid}
      - ${region}
      - ${tenancy_ocid}
      - ${app_compartment_id_in_subtree}
      - ${app_compartment_name}
      - ${network_compartment_id_in_subtree}
      - ${network_compartment_name}
      - ${project_tag}
      - ${subnet_display_name}
     

  - title: "API Gateway Connection"
    variables:
      - ${gateway_endpoint_type}
      - ${gateway_display_name}
      - ${api_content}
      - ${api_display_name}

  - title: "Certificate"
    variables:
      - ${certificate_certificate}
      - ${certificate_private_key}
      - ${certificate_display_name}
  
  - title: "Usageplan and Subscription"
    variables:
      - ${subscriber_clients_name}
      - ${subscriber_clients_token}
      - ${subscriber_usage_plans}
      - ${subscriber_display_name}
      - ${usage_plan_entitlements_name}
      - ${usage_plan_entitlements_description}
      - ${usage_plan_entitlements_quota_operation_on_breach}
      - ${usage_plan_entitlements_quota_reset_policy}
      - ${usage_plan_entitlements_quota_unit}
      - ${usage_plan_entitlements_quota_value}
      - ${usage_plan_entitlements_rate_limit_unit}
      - ${usage_plan_entitlements_rate_limit_value}

    
  - title: "Gateway Deployment"
    variables:
      - ${path_prefix}
      - ${token_locations}
      - ${type}
      - ${url}
      - ${path}
      - ${methods}
              
variables:
#####################################
# Common Variables
#####################################


  region:
    type: string
    default: ""
    title: Region Name
    description: The region where the resources will be provisioned
    visible: true
    required: true

  tenancy_ocid:
    type: string
    default: ""
    title: "Tenancy OCID"
    description: "Tenancy OCID"
    visible: true
    required: true

  app_compartment_id_in_subtree:
    type: bool
    default: true
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  app_compartment_name:
    type: string
    default: ""
    title: "Compartment Name to deploy the resource"
    description: "Compartment Name to deploy the resource"
    visible: true
    required: true
  
  network_compartment_id_in_subtree:
    type: bool
    default: true
    title: "Compartment id in subtree"
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  network_compartment_name:
    type: string
    default: ""
    title: "Compartment Name of the Subnet"
    description: "Compartment Name of the Subnet"
    visible: true
    required: true

  subnet_display_name:
    type: string
    default: "example_subnet"
    title: "Subnet Name"
    description: "The subnet in which the application is deployed"
    visible: true
    required: true

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false

  gateway_endpoint_type:
    type: string
    default: "PRIVATE"
    title: "Gateway endpoint type"
    description: "The type of endpoint for the gateway. Possible values are PUBLIC or PRIVATE"
    visible: true
    required: true

  gateway_display_name:
    type: string
    default: "example_gateway"
    title: "Name of the gateway"
    description: "The display name of the gateway"
    visible: true
    required: true

  api_content:
    type: text
    multiline: true
    title: "Content of API"
    description: "The content of the API definition in OpenAPI format"
    visible: true
    required: true

  api_display_name:
    type: string
    default: "test API definiton"
    title: "Name of the API"
    description: "The display name of the API definition"
    visible: true
    required: true

