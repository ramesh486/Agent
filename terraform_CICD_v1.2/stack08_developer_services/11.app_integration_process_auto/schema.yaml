title: Opa Instance
description: Opa Instance
schemaVersion: 1.1.0
version: "19062023"

#####################################
# Variable Groupings
#####################################

groupings:

  - title: "Select Compartment"
    variables:
      - ${region}
      - ${compartment_id_in_subtree}
      - ${compartment_name}
      - ${tenancy_ocid}
      - ${idcs_access_token}
      - ${consumption_model}
      - ${display_name}
      - ${metering_type}
      - ${shape_name}
      - ${project_tag}

variables:

#####################################
# Common Compartment
#####################################

 
  tenancy_ocid:
    visible: true
    title: Tenancy OCID
    description: Tenancy OCID

  region:
    visible: true
    required: true
    title: Region
    description: Region
    default: "us-ashburn-1"

  compartment_id_in_subtree:
    type: bool
    title: "Compartment ID in Subtree"
    default: true
    description: "Compartment ID in Subtree"
    visible: true
    required: true

  compartment_name:
    type: string
    title: "Compartment Name"
    default: ""
    description: "Compartment Name to deploy the resource"
    visible: true
    required: true

  idcs_access_token:
    type: password
    required: true
    title: Identity Personal Access Token
    visible: true
    description: Provide token that you have generated in OCI console

  consumption_model:
    title: Consumption model
    type: string
    required: true
    visible: true
    default: "UCM"
    description: Enter consumption model

  display_name:
    title: Display name
    type: string
    required: true
    visible: true
    default: "test_opa_instance"
    description: Enter display name

  metering_type:
    title: Metering_type
    type: string
    required: true
    visible: true
    default: "EXECUTION_PACK"
    description: Enter metering type

  project_tag:
    type: oci:identity:tag:value
    title: Attach Tags
    description: Attach the Tags
    visible: true
    required: false
  